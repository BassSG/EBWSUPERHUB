    <style>
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0a0a12;
            --bg-card: #0d0d1a;
            --bg-card-hover: #12122a;
            --accent-blue: #4f8ef7;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-gold: #f59e0b;
            --accent-pink: #ec4899;
            --accent-orange: #f97316;
            --text-primary: #f0f0ff;
            --text-secondary: #8888aa;
            --text-muted: #555577;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(79,142,247,0.4);
            --glow-blue: rgba(79,142,247,0.15);
            --glow-purple: rgba(139,92,246,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ========== ANIMATED BACKGROUND ========== */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-canvas::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation: floatBg1 20s ease-in-out infinite;
        }

        .bg-canvas::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: floatBg2 25s ease-in-out infinite;
        }

        @keyframes floatBg1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, 50px) scale(1.1); }
            66% { transform: translate(-50px, 100px) scale(0.9); }
        }

        @keyframes floatBg2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-80px, -60px) scale(1.15); }
            66% { transform: translate(60px, -80px) scale(0.95); }
        }

        /* Grid lines */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ========== LAYOUT ========== */
        .app-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 72px;
            height: 100vh;
            background: rgba(10,10,18,0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 4px;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
            z-index: 100;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .sidebar.expanded {
            width: 220px;
        }

        .sidebar-logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(79,142,247,0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .sidebar-logo:hover {
            transform: scale(1.05);
        }

        .sidebar-divider {
            width: 40px;
            height: 1px;
            background: var(--border);
            margin: 8px 0;
            flex-shrink: 0;
        }

        .sidebar-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .sidebar-btn:hover {
            background: rgba(79,142,247,0.1);
            color: var(--accent-blue);
        }

        .sidebar-btn.active {
            background: rgba(79,142,247,0.15);
            color: var(--accent-blue);
        }

        .sidebar-btn .tooltip {
            position: absolute;
            left: 56px;
            background: rgba(10,10,20,0.95);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 999;
        }

        .sidebar-btn:hover .tooltip {
            opacity: 1;
        }

        .sidebar-spacer {
            flex: 1;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== TOP BAR ========== */
        .topbar {
            height: 60px;
            background: rgba(10,10,18,0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .topbar-title span {
            color: var(--accent-blue);
        }

        .topbar-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            color: var(--accent-green);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .topbar-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .topbar-btn:hover {
            border-color: var(--border-hover);
            color: var(--accent-blue);
            background: rgba(79,142,247,0.08);
        }

        /* ========== CONTENT AREA ========== */
        .content-area {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ========== HOME DASHBOARD ========== */
        .home-view {
            height: 100%;
            overflow-y: auto;
            padding: 24px;
            display: none;
        }

        .home-view.active {
            display: block;
        }

        .home-view::-webkit-scrollbar {
            width: 4px;
        }

        .home-view::-webkit-scrollbar-track {
            background: transparent;
        }

        .home-view::-webkit-scrollbar-thumb {
            background: rgba(79,142,247,0.3);
            border-radius: 2px;
        }

        /* Hero Section */
        .hero-section {
            text-align: center;
            padding: 40px 20px 32px;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79,142,247,0.08);
            border: 1px solid rgba(79,142,247,0.2);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            color: var(--accent-blue);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .hero-title {
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, rgba(79,142,247,0.9) 50%, rgba(139,92,246,0.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(13,13,26,0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(79,142,247,0.3);
            background: rgba(79,142,247,0.05);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Section Title */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* App Grid */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .app-card {
            background: rgba(13,13,26,0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.02));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .app-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,142,247,0.1);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-card-glow {
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .app-card:hover .app-card-glow {
            opacity: 1;
        }

        .app-card-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            position: relative;
        }

        .app-icon::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 15px;
            background: inherit;
            filter: blur(8px);
            opacity: 0.4;
            z-index: -1;
        }

        .app-info {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .app-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .app-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .app-open-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-blue);
            transition: gap 0.2s;
        }

        .app-card:hover .app-open-btn {
            gap: 10px;
        }

        /* ========== IFRAME VIEW ========== */
        .iframe-view {
            height: 100%;
            display: none;
            flex-direction: column;
        }

        .iframe-view.active {
            display: flex;
        }

        .iframe-toolbar {
            height: 48px;
            background: rgba(10,10,18,0.95);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            flex-shrink: 0;
        }

        .iframe-back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .iframe-back-btn:hover {
            background: rgba(79,142,247,0.1);
            border-color: rgba(79,142,247,0.3);
            color: var(--accent-blue);
        }

        .iframe-url-bar {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .iframe-url-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .iframe-actions {
            display: flex;
            gap: 6px;
        }

        .iframe-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-decoration: none;
        }

        .iframe-action-btn:hover {
            border-color: rgba(79,142,247,0.3);
            color: var(--accent-blue);
            background: rgba(79,142,247,0.08);
        }

        .iframe-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .iframe-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            gap: 16px;
            z-index: 10;
        }

        .iframe-loading.hidden {
            display: none;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(79,142,247,0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== QUICK LAUNCH ========== */
        .quick-launch {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .quick-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(13,13,26,0.8);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: rgba(79,142,247,0.3);
            color: var(--text-primary);
            background: rgba(79,142,247,0.05);
        }

        /* ========== MOBILE BOTTOM NAV ========== */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: rgba(10,10,18,0.98);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 200;
            padding: 0 8px;
            align-items: center;
            justify-content: space-around;
        }

        .mobile-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 12px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 10px;
        }

        .mobile-nav-btn .icon {
            font-size: 20px;
        }

        .mobile-nav-btn.active {
            color: var(--accent-blue);
        }

        /* ========== SEARCH OVERLAY ========== */
        .search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 500;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 80px;
        }

        .search-overlay.active {
            display: flex;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            background: rgba(13,13,26,0.98);
            border: 1px solid rgba(79,142,247,0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,142,247,0.1);
            margin: 0 20px;
        }

        .search-input-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-results {
            max-height: 400px;
            overflow-y: auto;
            padding: 8px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: rgba(79,142,247,0.08);
        }

        .search-result-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .search-result-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .mobile-nav {
                display: flex;
            }

            .main-content {
                padding-bottom: 64px;
            }

            .home-view {
                padding: 16px;
            }

            .hero-section {
                padding: 24px 16px 20px;
            }

            .app-grid {
                grid-template-columns: 1fr;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
        }

        .fade-in-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-in-up:nth-child(2) { animation-delay: 0.1s; }
        .fade-in-up:nth-child(3) { animation-delay: 0.15s; }
        .fade-in-up:nth-child(4) { animation-delay: 0.2s; }
        .fade-in-up:nth-child(5) { animation-delay: 0.25s; }
        .fade-in-up:nth-child(6) { animation-delay: 0.3s; }
        .fade-in-up:nth-child(7) { animation-delay: 0.35s; }
        .fade-in-up:nth-child(8) { animation-delay: 0.4s; }
        .fade-in-up:nth-child(9) { animation-delay: 0.45s; }
        .fade-in-up:nth-child(10) { animation-delay: 0.5s; }
        .fade-in-up:nth-child(11) { animation-delay: 0.55s; }
        .fade-in-up:nth-child(12) { animation-delay: 0.6s; }
        .fade-in-up:nth-child(13) { animation-delay: 0.65s; }
        .fade-in-up:nth-child(14) { animation-delay: 0.7s; }
        .fade-in-up:nth-child(15) { animation-delay: 0.75s; }

        /* Notification dot */
        .notif-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: var(--accent-pink);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        /* Category tabs */
        .cat-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .cat-tabs::-webkit-scrollbar { display: none; }

        .cat-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }

        .cat-tab.active, .cat-tab:hover {
            background: rgba(79,142,247,0.1);
            border-color: rgba(79,142,247,0.3);
            color: var(--accent-blue);
        }

        .category-sections {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 32px;
        }

        .category-block {
            background: rgba(13,13,26,0.45);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
        }

        .category-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .category-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .category-count {
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 3px 8px;
        }

        .app-preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            border: 1px solid var(--border);
            object-fit: cover;
            display: block;
        }

        .app-preview-wrap {
            position: relative;
        }

        .preview-fallback {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(139,92,246,0.12));
            border: 1px dashed rgba(255,255,255,0.12);
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(79,142,247,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }

        /* Time display */
        .time-display {
            font-size: 11px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>

        tagText: "#14b8a6",
        url: "https://basssg.github.io/Pickup/",
        cat: "lifestyle"
    }
];

const categoryMeta = {
    all: { icon: "🌐", title: "ทั้งหมด" },
    trading: { icon: "📈", title: "Trading & Investment" },
    news: { icon: "📰", title: "News & Updates" },
    tools: { icon: "🛠️", title: "Tools & Automation" },
    lifestyle: { icon: "🌟", title: "Lifestyle & Service" }
};

function getPreviewImageUrl(url) {
    return `https://image.thum.io/get/width/1200/crop/700/noanimate/${encodeURIComponent(url)}`;
}

function renderAppCard(app, i) {
    const previewUrl = getPreviewImageUrl(app.url);
    return `
        <div class="app-card fade-in-up" onclick="openApp(${app.id})" style="--delay:${i * 0.05}s">
            <div class="app-card-glow" style="background: radial-gradient(circle, ${app.glow} 0%, transparent 70%)"></div>
            <div class="app-preview-wrap">
                <img
                    class="app-preview"
                    src="${previewUrl}"
                    alt="ภาพตัวอย่าง ${app.name}"
                    loading="lazy"
                    referrerpolicy="no-referrer"
                    onerror="this.style.opacity='0'; this.nextElementSibling.style.display='flex';"
                />
                <div class="preview-fallback">ไม่สามารถโหลดภาพตัวอย่างได้<br>กดเพื่อเปิดหน้าเว็บ</div>
            </div>
            <div class="app-card-header">
                <div class="app-icon" style="background: ${app.color}">
                    ${app.icon}
                </div>
                <div class="app-info">
                    <div class="app-name">${app.name}</div>
                    <div class="app-desc">${app.desc}</div>
                </div>
            </div>
            <div class="app-card-footer">
                <span class="app-tag" style="background: ${app.tagColor}; color: ${app.tagText}">
                    ${app.tag}
                </span>
                <span class="app-open-btn">
                    เปิดแอป →
                </span>
            </div>
        </div>
    `;
}

// ========== RENDER CATEGORIZED APPS ==========
function renderApps(filter = 'all') {
    const container = document.getElementById('categorySections');
    const categories = filter === 'all'
        ? ['trading', 'news', 'tools', 'lifestyle']
        : [filter];

    container.innerHTML = categories.map(cat => {
        const list = apps.filter(app => app.cat === cat);
        const meta = categoryMeta[cat];
        return `
            <section class="category-block">
                <div class="category-head">
                    <h3 class="category-title">${meta.icon} ${meta.title}</h3>
                    <span class="category-count">${list.length} apps</span>
                </div>
                <div class="app-grid">
                    ${list.map((app, i) => renderAppCard(app, i)).join('')}
                </div>
            </section>
        `;
    }).join('');
}

// ========== FILTER CATEGORY ==========
function filterCat(cat, btn) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderApps(cat);
}

// ========== OPEN APP ==========
function openApp(id) {
    const app = apps.find((item) => item.id === id);
    if (!app) return;

    document.getElementById('homeView').classList.remove('active');
    const iframeView = document.getElementById('iframeView');
    iframeView.classList.add('active');

    document.getElementById('iframeUrlText').textContent = app.url;
    document.getElementById('openExternal').href = app.url;

    const iframe = document.getElementById('mainIframe');
    const loading = document.getElementById('iframeLoading');
    
    loading.classList.remove('hidden');
    iframe.src = app.url;

    // Update topbar title
    document.querySelector('.topbar-title').innerHTML = `<span>${app.icon}</span> ${app.name}`;

    // Update sidebar active
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));

    closeSearchDirect();
}

// ========== SHOW HOME ==========
function showHome() {
    document.getElementById('homeView').classList.add('active');
    document.getElementById('iframeView').classList.remove('active');
    document.querySelector('.topbar-title').innerHTML = `<span>⚡ AI</span> Command Center`;
    document.getElementById('mainIframe').src = '';
    
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sb-home').classList.add('active');
}

// ========== IFRAME LOADED ==========
function iframeLoaded() {
    document.getElementById('iframeLoading').classList.add('hidden');
}

// ========== RELOAD IFRAME ==========
function reloadIframe() {
    const iframe = document.getElementById('mainIframe');
    const loading = document.getElementById('iframeLoading');
    loading.classList.remove('hidden');
    iframe.src = iframe.src;
}

// ========== SEARCH ==========
function openSearch() {
    document.getElementById('searchOverlay').classList.add('active');
    document.getElementById('searchInput').value = '';
    renderSearchResults(apps);
    setTimeout(() => document.getElementById('searchInput').focus(), 100);
}

function closeSearch(e) {
    if (e.target === document.getElementById('searchOverlay')) {
        closeSearchDirect();
    }
}

function closeSearchDirect() {
    document.getElementById('searchOverlay').classList.remove('active');
}

function filterSearch(query) {
    const filtered = apps.filter(a => 
        a.name.toLowerCase().includes(query.toLowerCase()) ||
        a.desc.toLowerCase().includes(query.toLowerCase()) ||
        a.tag.toLowerCase().includes(query.toLowerCase())
    );
    renderSearchResults(filtered);
}

function renderSearchResults(list) {
    const container = document.getElementById('searchResults');
    if (list.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:24px; color:var(--text-muted); font-size:13px">ไม่พบแอปที่ค้นหา</div>';
        return;
    }
    container.innerHTML = list.map(app => `
        <div class="search-result-item" onclick="openApp(${app.id})">
            <div class="search-result-icon" style="background: ${app.color}">${app.icon}</div>
            <div class="search-result-info">
                <div class="search-result-name">${app.name}</div>
                <div class="search-result-desc">${app.desc.substring(0, 60)}...</div>
            </div>
            <span style="font-size:12px; color:var(--text-muted)">→</span>
        </div>
    `).join('');
}

// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        openSearch();
    }
    if (e.key === 'Escape') {
        closeSearchDirect();
        showHome();
    }
});

// ========== CLOCK ==========
function updateTime() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('th-TH', { 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit'
    });
    const dateStr = now.toLocaleDateString('th-TH', {
        day: 'numeric',
        month: 'short'
    });
    
    const topbarTime = document.getElementById('topbarTime');
    if (topbarTime) topbarTime.textContent = `${dateStr} ${timeStr}`;
    
    const sidebarTime = document.getElementById('sidebarTime');
    if (sidebarTime) sidebarTime.textContent = timeStr;
}

setInterval(updateTime, 1000);
updateTime();

// ========== PARTICLES ==========
function createParticle() {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
    particle.style.animationDelay = Math.random() * 5 + 's';
    particle.style.opacity = Math.random() * 0.5 + 0.1;
    document.body.appendChild(particle);
    
    setTimeout(() => particle.remove(), 25000);
}

setInterval(createParticle, 3000);

// ========== INIT ==========
renderApps();

// ========== PWA SERVICE WORKER REGISTRATION ==========
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(registration => {
                console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(err => {
                console.log('ServiceWorker registration failed: ', err);
            });
    });
}
</script>

</body>
</html>
